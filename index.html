<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Self-Healing Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121214; color: #fff; padding: 30px; }
        .grid { display: flex; gap: 20px; margin-top: 20px; }
        .card { background: #1e1e24; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .metric { font-size: 2.5rem; font-weight: bold; margin-top: 10px; color: #00f2fe; }
        button { padding: 15px 25px; font-size: 1rem; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; margin-right: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-fault { background-color: #ff4b4b; color: white; }
        .btn-repair { background-color: #2ea043; color: white; }
        pre { background: #27272a; padding: 15px; border-radius: 5px; font-size: 1.4rem; font-weight: bold; color: #a1a1aa; border-left: 5px solid #00f2fe; }
    </style>
</head>
<body>

    <h1>🛡️ Real-Time Self-Healing IoT Network Controller</h1>
    <hr style="border-color: #333;">

    <h3>Network Control Panel</h3>
    <button class="btn-fault" onclick="sendCmd('FAULT')">🚨 Inject Fault to Node 2</button>
    <button class="btn-repair" onclick="sendCmd('REPAIR')">🔧 Send Repair Command</button>

    <h3>Live Network Topology Map</h3>
    <pre id="topology">📡 Connecting to Gateway Sink Node Stream...</pre>

    <h3>Telemetry Streams</h3>
    <div class="grid">
        <div class="card"><h3>Temperature</h3><div class="metric" id="temp">-- °C</div></div>
        <div class="card"><h3>Humidity</h3><div class="metric" id="hum">-- %</div></div>
        <div class="card"><h3>MQ2 Gas Level</h3><div class="metric" id="mq2">--</div></div>
    </div>

    <script>
        // Updated with your specific Cluster credentials
        const HOST = "f41ae93c9d2940c481e87718c8f75dc7.s1.eu.hivemq.cloud"; 
        const PORT = 8884; 
        const USER = "amrita_node";
        const PASS = "HealNet2026";

        const client = new Paho.MQTT.Client(HOST, PORT, "Dashboard_" + Math.random().toString(16).substr(2, 8));
        
        client.onMessageArrived = function(message) {
            if(message.destinationName === "network/dashboard_stream") {
                const data = JSON.parse(message.payloadString);
                document.getElementById("temp").innerText = data.temp.toFixed(1) + " °C";
                document.getElementById("hum").innerText = data.hum.toFixed(1) + " %";
                document.getElementById("mq2").innerText = data.mq2;
                
                if(data.path === "Node1->Node2->Node3") {
                    document.getElementById("topology").innerHTML = "🟢 Active Route: Node 1 --------> Node 2 --------> Node 3 [NORMAL OPERATION]";
                    document.getElementById("topology").style.borderLeftColor = "#2ea043";
                    document.getElementById("topology").style.color = "#2ea043";
                } else {
                    document.getElementById("topology").innerHTML = "⚠️ Active Route: Node 1 -------------------------> Node 3 [⚠️ NODE 2 BYPASSED VIA HEAL]";
                    document.getElementById("topology").style.borderLeftColor = "#ff4b4b";
                    document.getElementById("topology").style.color = "#ff4b4b";
                }
            }
        };

        client.connect({
            onSuccess: () => { client.subscribe("network/dashboard_stream"); },
            useSSL: true,
            userName: USER,
            password: PASS
        });

        function sendCmd(cmd) {
            const message = new Paho.MQTT.Message(cmd);
            message.destinationName = "network/control";
            client.send(message);
        }
    </script>
</body>
</html>
